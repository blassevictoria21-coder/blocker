<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Email Spam Blocker - Login</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .auth-container {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }
    .auth-box {
      background: white;
      padding: 40px;
      border-radius: 10px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      width: 100%;
      max-width: 400px;
    }
    .auth-box h1 {
      text-align: center;
      color: #333;
      margin-bottom: 30px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: #555;
    }
    .form-group input {
      width: 100%;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 5px;
      font-size: 14px;
    }
    .form-group input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
    }
    .btn-primary {
      width: 100%;
      padding: 12px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 5px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 10px;
    }
    .btn-primary:hover {
      background: #764ba2;
    }
    .toggle-auth {
      text-align: center;
      margin-top: 20px;
      color: #666;
    }
    .toggle-auth button {
      background: none;
      border: none;
      color: #667eea;
      cursor: pointer;
      font-weight: 600;
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="auth-container">
    <div class="auth-box">
      <h1>📧 Email Spam Blocker</h1>
      
      <div id="login-form">
        <h2>Login</h2>
        <form onsubmit="handleLogin(event)">
          <div class="form-group">
            <label>Email</label>
            <input type="email" id="login-email" required>
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" id="login-password" required>
          </div>
          <button type="submit" class="btn-primary">Login</button>
        </form>
      </div>

      <div id="register-form" style="display: none;">
        <h2>Register</h2>
        <form onsubmit="handleRegister(event)">
          <div class="form-group">
            <label>First Name</label>
            <input type="text" id="register-firstName">
          </div>
          <div class="form-group">
            <label>Last Name</label>
            <input type="text" id="register-lastName">
          </div>
          <div class="form-group">
            <label>Email</label>
            <input type="email" id="register-email" required>
          </div>
          <div class="form-group">
            <label>Password (min 8 chars)</label>
            <input type="password" id="register-password" required>
          </div>
          <button type="submit" class="btn-primary">Register</button>
        </form>
      </div>

      <div class="toggle-auth">
        <p id="toggle-text">Don't have an account? <button onclick="toggleForms()">Register</button></p>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script>
    function toggleForms() {
      const loginForm = document.getElementById('login-form');
      const registerForm = document.getElementById('register-form');
      const toggleText = document.getElementById('toggle-text');
      
      if (loginForm.style.display === 'none') {
        loginForm.style.display = 'block';
        registerForm.style.display = 'none';
        toggleText.innerHTML = "Don't have an account? <button onclick=\"toggleForms()\">Register</button>";
      } else {
        loginForm.style.display = 'none';
        registerForm.style.display = 'block';
        toggleText.innerHTML = "Already have an account? <button onclick=\"toggleForms()\">Login</button>";
      }
    }

    async function handleLogin(event) {
      event.preventDefault();
      const email = document.getElementById('login-email').value;
      const password = document.getElementById('login-password').value;
      await AuthManager.handleLogin(email, password);
    }

    async function handleRegister(event) {
      event.preventDefault();
      const email = document.getElementById('register-email').value;
      const password = document.getElementById('register-password').value;
      const firstName = document.getElementById('register-firstName').value;
      const lastName = document.getElementById('register-lastName').value;
      await AuthManager.handleRegister(email, password, firstName, lastName);
    }

    // Redirect if already logged in
    if (AuthManager.isAuthenticated()) {
      window.location.href = 'sound.html';
    }
  </script>
</body>
</html>
