<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Email Spam Blocker</title>
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      margin: 0;
      padding: 0;
      color: #333;
    }
    header {
      background: #2c3e50;
      color: white;
      padding: 20px;
      text-align: center;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    header h1 {
      margin: 0 0 5px 0;
    }
    header p {
      margin: 0;
      font-size: 14px;
      opacity: 0.9;
    }
    .container {
      display: flex;
      justify-content: space-between;
      padding: 20px;
      gap: 20px;
      max-width: 1400px;
      margin: 0 auto;
      flex-wrap: wrap;
    }
    .emails, .dashboard {
      background: white;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      flex: 1;
      min-width: 350px;
    }
    h2 {
      margin-top: 0;
      color: #34495e;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .email-badge {
      background: #3498db;
      color: white;
      border-radius: 20px;
      padding: 2px 10px;
      font-size: 12px;
      font-weight: bold;
    }
    .email {
      border-bottom: 1px solid #ddd;
      padding: 12px 0;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      animation: slideIn 0.3s ease;
    }
    .email:last-child {
      border-bottom: none;
    }
    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateX(-10px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }
    .email-content {
      flex: 1;
    }
    .email-subject {
      margin: 0 0 5px 0;
      word-break: break-word;
      font-weight: 500;
    }
    .email-subject strong {
      color: #555;
      font-weight: 600;
    }
    .email-addresses {
      font-size: 12px;
      color: #666;
      margin: 5px 0;
      line-height: 1.4;
    }
    .email-addresses span {
      display: block;
    }
    .from-label, .to-label {
      font-weight: 600;
      color: #555;
    }
    .email-address {
      color: #3498db;
      word-break: break-all;
    }
    .email-meta {
      font-size: 12px;
      color: #999;
      margin: 5px 0 0 0;
    }
    .email-actions {
      margin-left: 10px;
      display: flex;
      gap: 5px;
    }
    .spam { color: #e74c3c; font-weight: bold; }
    .safe { color: #27ae60; font-weight: bold; }
    .delete-btn {
      background: #e74c3c;
      color: white;
      border: none;
      border-radius: 50%;
      width: 24px;
      height: 24px;
      cursor: pointer;
      font-size: 12px;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
      flex-shrink: 0;
    }
    .delete-btn:hover {
      background: #c0392b;
    }
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: #999;
    }
    .empty-state p {
      margin: 0;
      font-size: 14px;
    }
    .chart {
      height: 200px;
      background: #f0f0f0;
      border-radius: 8px;
      margin-top: 20px;
      position: relative;
      overflow: hidden;
      border: 1px solid #ddd;
    }
    .chart-bar {
      height: 100%;
      border-radius: 8px;
      transition: width 0.5s ease;
      background: linear-gradient(to right, #27ae60, #e74c3c);
    }
    .chart-label {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 18px;
      font-weight: bold;
      color: white;
      text-shadow: 0 1px 3px rgba(0,0,0,0.5);
      white-space: nowrap;
    }
    .stats {
      display: flex;
      gap: 20px;
      margin-top: 15px;
      padding-top: 15px;
      border-top: 1px solid #ddd;
    }
    .stat {
      flex: 1;
      text-align: center;
    }
    .stat-label {
      font-size: 12px;
      color: #999;
      margin-bottom: 5px;
    }
    .stat-value {
      font-size: 24px;
      font-weight: bold;
    }
    .stat-value.spam-color { color: #e74c3c; }
    .stat-value.safe-color { color: #27ae60; }
    .input-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 20px;
    }
    .input-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    input[type="text"], input[type="email"] {
      padding: 10px;
      flex: 1;
      min-width: 150px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 14px;
    }
    input[type="text"]:focus, input[type="email"]:focus {
      outline: none;
      border-color: #3498db;
      box-shadow: 0 0 5px rgba(52, 152, 219, 0.3);
    }
    button {
      padding: 10px 15px;
      background: #2c3e50;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: 500;
      transition: background 0.2s;
      white-space: nowrap;
    }
    button:hover {
      background: #34495e;
    }
    button:disabled {
      background: #bdc3c7;
      cursor: not-allowed;
    }
    .sound-toggle {
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid #ddd;
    }
    .form-group {
      display: flex;
      align-items: center;
      margin-bottom: 12px;
      gap: 10px;
    }
    .form-group label {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 0;
      cursor: pointer;
      font-size: 14px;
    }
    .form-group input[type="checkbox"] {
      cursor: pointer;
      width: 18px;
      height: 18px;
    }
    select {
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 14px;
    }
    select:focus {
      outline: none;
      border-color: #3498db;
    }
    #testSound {
      margin-top: 10px;
      background: #8e44ad;
      padding: 8px 12px;
      font-size: 14px;
    }
    #testSound:hover {
      background: #732d91;
    }
    .action-buttons {
      display: flex;
      gap: 10px;
      margin-top: 20px;
      flex-wrap: wrap;
    }
    .action-buttons button {
      flex: 1;
      min-width: 120px;
    }
    #clearAllBtn {
      background: #e74c3c;
    }
    #clearAllBtn:hover {
      background: #c0392b;
    }
    .input-label {
      font-weight: 600;
      color: #555;
      font-size: 13px;
      display: block;
      margin-bottom: 8px;
    }
    @media (max-width: 768px) {
      .container {
        flex-direction: column;
      }
      .emails, .dashboard {
        width: 100%;
      }
      .input-group {
        flex-direction: column;
      }
      .input-row {
        flex-direction: column;
      }
      input[type="text"], input[type="email"] {
        min-width: 100%;
      }
      h2 {
        flex-direction: column;
        align-items: flex-start;
      }
      .email-badge {
        margin-top: 10px;
      }
      .email {
        flex-direction: column;
      }
      .email-actions {
        margin-left: 0;
        margin-top: 10px;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>📧 Email Spam Blocker</h1>
    <p>Classify emails as Spam or Safe using AI-powered keyword detection</p>
  </header>

  <div class="container">
    <div class="emails">
      <h2>
        Inbox
        <span class="email-badge" aria-label="Total emails">
          <span id="emailCount">0</span> emails
        </span>
      </h2>
      
      <div class="input-group">
        <div>
          <label class="input-label" for="fromInput">📤 From (Sender)</label>
          <input 
            type="email" 
            id="fromInput" 
            placeholder="sender@example.com" 
            aria-label="Email sender address"
          >
        </div>
        
        <div>
          <label class="input-label" for="toInput">📥 To (Receiver)</label>
          <input 
            type="email" 
            id="toInput" 
            placeholder="receiver@example.com" 
            aria-label="Email receiver address"
          >
        </div>
        
        <div>
          <label class="input-label" for="emailInput">📋 Subject</label>
          <input 
            type="text" 
            id="emailInput" 
            placeholder="Enter email subject..." 
            aria-label="Email subject input"
          >
        </div>
        
        <button id="addBtn" aria-label="Add email to inbox">➕ Add Email</button>
      </div>
      
      <div id="emailList" role="list" aria-label="Email list"></div>
      
      <div class="action-buttons">
        <button id="clearAllBtn" aria-label="Clear all emails from inbox">🗑️ Clear All</button>
        <button id="exportBtn" aria-label="Export emails as JSON">📥 Export Data</button>
      </div>
    </div>

    <div class="dashboard">
      <h2>📊 Spam Overview</h2>
      <div class="chart">
        <div class="chart-bar" id="chartBar" style="width: 0;" aria-hidden="true"></div>
        <div class="chart-label" id="chartLabel">0% Safe | 0% Spam</div>
      </div>
      
      <div class="stats">
        <div class="stat">
          <div class="stat-label">Safe Emails</div>
          <div class="stat-value safe-color" id="safeStatValue">0</div>
        </div>
        <div class="stat">
          <div class="stat-label">Spam Emails</div>
          <div class="stat-value spam-color" id="spamStatValue">0</div>
        </div>
      </div>

      <div class="sound-toggle">
        <div class="form-group">
          <label>
            <input type="checkbox" id="soundToggle" checked aria-label="Enable spam alert sound">
            Enable Spam Alert Sound
          </label>
        </div>
        
        <div class="form-group">
          <label for="soundSelect">Choose Sound:</label>
          <select id="soundSelect" aria-label="Select alert sound type">
            <option value="beep">Beep</option>
            <option value="sharp">Sharp Beep</option>
            <option value="soft">Soft Beep</option>
            <option value="alarm">Alarm</option>
          </select>
        </div>
        
        <button id="testSound" aria-label="Test the selected sound">🔊 Test Sound</button>
      </div>
    </div>
  </div>

  <script>
    // Enhanced spam detection with patterns
    const spamPatterns = [
      { word: "free", weight: 1 },
      { word: "offer", weight: 1 },
      { word: "win", weight: 2 },
      { word: "prize", weight: 2 },
      { word: "limited", weight: 1 },
      { word: "urgent", weight: 1 },
      { word: "act now", weight: 2 },
      { word: "click here", weight: 1 },
      { word: "claim", weight: 1 },
      { word: "verify", weight: 1 },
      { word: "congratulations", weight: 2 },
      { word: "inheritance", weight: 2 },
      { regex: /!!!+/, weight: 1 },
      { regex: /\$\d+/, weight: 1 }
    ];

    // Common spam sender domains
    const spamSenderDomains = [
      "noreply@",
      "no-reply@",
      "donotreply@",
      "spam@",
      "marketing@",
      "promotions@",
      "deals@",
      "offers@"
    ];

    // DOM Elements
    const fromInput = document.getElementById("fromInput");
    const toInput = document.getElementById("toInput");
    const emailInput = document.getElementById("emailInput");
    const emailList = document.getElementById("emailList");
    const chartBar = document.getElementById("chartBar");
    const chartLabel = document.getElementById("chartLabel");
    const soundToggle = document.getElementById("soundToggle");
    const soundSelect = document.getElementById("soundSelect");
    const addBtn = document.getElementById("addBtn");
    const testSoundBtn = document.getElementById("testSound");
    const emailCount = document.getElementById("emailCount");
    const clearAllBtn = document.getElementById("clearAllBtn");
    const exportBtn = document.getElementById("exportBtn");
    const safeStatValue = document.getElementById("safeStatValue");
    const spamStatValue = document.getElementById("spamStatValue");

    let spamCount = 0, safeCount = 0;
    let emails = [];
    const STORAGE_KEY = "spamBlockerEmails";

    // Load emails from localStorage on page load
    function loadEmailsFromStorage() {
      try {
        const stored = localStorage.getItem(STORAGE_KEY);
        if (stored) {
          emails = JSON.parse(stored);
          emails.forEach(email => {
            renderEmail(email);
            if (email.classification === "spam") spamCount++;
            else safeCount++;
          });
          updateChart();
        }
      } catch (error) {
        console.error("Error loading emails from storage:", error);
      }
    }

    // Save emails to localStorage
    function saveToStorage() {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(emails));
      } catch (error) {
        console.error("Error saving emails to storage:", error);
        alert("Storage quota exceeded. Please clear some emails.");
      }
    }

    // Enhanced Web Audio API sound generator with more sounds
    function playBeep(type) {
      try {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const ctx = new AudioContext();
        const oscillator = ctx.createOscillator();
        const gainNode = ctx.createGain();

        oscillator.connect(gainNode);
        gainNode.connect(ctx.destination);

        const soundConfigs = {
          beep: {
            type: "square",
            frequency: 880,
            gain: 0.3,
            duration: 0.3
          },
          sharp: {
            type: "sawtooth",
            frequency: 1200,
            gain: 0.4,
            duration: 0.15
          },
          soft: {
            type: "sine",
            frequency: 600,
            gain: 0.2,
            duration: 0.5
          },
          alarm: {
            type: "triangle",
            frequency: 1000,
            gain: 0.35,
            duration: 0.4
          }
        };

        const config = soundConfigs[type] || soundConfigs.beep;
        oscillator.type = config.type;
        oscillator.frequency.setValueAtTime(config.frequency, ctx.currentTime);
        gainNode.gain.setValueAtTime(config.gain, ctx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + config.duration);
        oscillator.start(ctx.currentTime);
        oscillator.stop(ctx.currentTime + config.duration);
      } catch (error) {
        console.error("Error playing sound:", error);
      }
    }

    // Secure HTML escape function
    function escapeHtml(text) {
      const map = {
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#039;"
      };
      return text.replace(/[&<>"']/g, m => map[m]);
    }

    // Validate email format
    function isValidEmail(email) {
      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      return emailRegex.test(email);
    }

    // Check if sender looks suspicious
    function isSuspiciousSender(from) {
      const lowerFrom = from.toLowerCase();
      return spamSenderDomains.some(domain => lowerFrom.includes(domain));
    }

    // Detect spam with weighted scoring
    function isSpam(subject, from, to) {
      let spamScore = 0;

      // Check subject
      const lowerSubject = subject.toLowerCase();
      for (const pattern of spamPatterns) {
        if (pattern.word) {
          if (lowerSubject.includes(pattern.word)) spamScore += pattern.weight;
        } else if (pattern.regex) {
          if (pattern.regex.test(lowerSubject)) spamScore += pattern.weight;
        }
      }

      // Check sender domain (bonus spam score)
      if (isSuspiciousSender(from)) spamScore += 2;

      // If "from" and "to" are the same, could be suspicious
      if (from.toLowerCase() === to.toLowerCase()) spamScore += 1;

      return spamScore >= 2;
    }

    // Render email to DOM
    function renderEmail(email) {
      const emailDiv = document.createElement("div");
      emailDiv.className = "email";
      emailDiv.role = "listitem";

      const contentDiv = document.createElement("div");
      contentDiv.className = "email-content";

      const subjectP = document.createElement("p");
      subjectP.className = "email-subject";
      subjectP.innerHTML = `<strong>Subject:</strong> ${escapeHtml(email.subject)}`;

      const addressesDiv = document.createElement("div");
      addressesDiv.className = "email-addresses";
      addressesDiv.innerHTML = `
        <span><span class="from-label">From:</span> <span class="email-address">${escapeHtml(email.from)}</span></span>
        <span><span class="to-label">To:</span> <span class="email-address">${escapeHtml(email.to)}</span></span>
      `;

      const metaP = document.createElement("p");
      metaP.className = "email-meta";
      metaP.textContent = new Date(email.timestamp).toLocaleString();

      const labelP = document.createElement("p");
      if (email.classification === "spam") {
        labelP.textContent = "⚠ Spam";
        labelP.className = "spam";
      } else {
        labelP.textContent = "✓ Safe";
        labelP.className = "safe";
      }

      contentDiv.appendChild(subjectP);
      contentDiv.appendChild(addressesDiv);
      contentDiv.appendChild(metaP);
      contentDiv.appendChild(labelP);

      const actionsDiv = document.createElement("div");
      actionsDiv.className = "email-actions";

      const deleteBtn = document.createElement("button");
      deleteBtn.className = "delete-btn";
      deleteBtn.textContent = "✕";
      deleteBtn.setAttribute("aria-label", `Delete email: ${email.subject}`);
      deleteBtn.addEventListener("click", () => deleteEmail(email.id));

      actionsDiv.appendChild(deleteBtn);

      emailDiv.appendChild(contentDiv);
      emailDiv.appendChild(actionsDiv);
      emailList.prepend(emailDiv);
    }

    // Classify and add email
    function addEmail(from, to, subject) {
      if (!subject.trim()) {
        alert("Please enter an email subject.");
        return;
      }

      if (from && !isValidEmail(from)) {
        alert("Please enter a valid sender email address.");
        return;
      }

      if (to && !isValidEmail(to)) {
        alert("Please enter a valid receiver email address.");
        return;
      }

      const classification = isSpam(subject, from, to) ? "spam" : "safe";
      const email = {
        id: Date.now(),
        from: from || "Unknown",
        to: to || "Unknown",
        subject: subject,
        classification: classification,
        timestamp: new Date().toISOString()
      };

      emails.unshift(email);
      renderEmail(email);

      if (classification === "spam") {
        spamCount++;
        if (soundToggle.checked) playBeep(soundSelect.value);
      } else {
        safeCount++;
      }

      updateChart();
      saveToStorage();
      
      // Clear inputs
      fromInput.value = "";
      toInput.value = "";
      emailInput.value = "";
      emailInput.focus();
    }

    // Delete specific email
    function deleteEmail(id) {
      const email = emails.find(e => e.id === id);
      if (!email) return;

      if (email.classification === "spam") spamCount--;
      else safeCount--;

      emails = emails.filter(e => e.id !== id);

      // Remove from DOM with animation
      const emailElements = document.querySelectorAll(".email");
      emailElements.forEach(el => {
        if (el.textContent.includes(email.subject)) {
          el.style.animation = "none";
          setTimeout(() => el.remove(), 100);
        }
      });

      updateChart();
      saveToStorage();
    }

    // Clear all emails
    function clearAllEmails() {
      if (emails.length === 0) return;
      if (confirm("Are you sure? This will delete all emails and cannot be undone.")) {
        emails = [];
        spamCount = 0;
        safeCount = 0;
        emailList.innerHTML = '<div class="empty-state"><p>📭 No emails yet. Add one to get started!</p></div>';
        updateChart();
        saveToStorage();
      }
    }

    // Export data as JSON
    function exportData() {
      const data = {
        exported: new Date().toISOString(),
        totalEmails: emails.length,
        spamCount,
        safeCount,
        emails
      };

      const dataStr = JSON.stringify(data, null, 2);
      const blob = new Blob([dataStr], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `spam-blocker-data-${Date.now()}.json`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    // Update chart and stats
    function updateChart() {
      const total = spamCount + safeCount;
      emailCount.textContent = total;
      safeStatValue.textContent = safeCount;
      spamStatValue.textContent = spamCount;

      if (total === 0) {
        chartBar.style.width = "0";
        chartLabel.textContent = "0% Safe | 0% Spam";
        emailList.innerHTML = '<div class="empty-state"><p>📭 No emails yet. Add one to get started!</p></div>';
        return;
      }

      const spamPercent = Math.round((spamCount / total) * 100);
      chartBar.style.width = spamPercent + "%";
      chartLabel.textContent = `${100 - spamPercent}% Safe | ${spamPercent}% Spam`;
    }

    // Update button state
    function updateButtonState() {
      addBtn.disabled = emailInput.value.trim() === "";
    }

    // Event listeners
    addBtn.addEventListener("click", () => {
      const from = fromInput.value.trim();
      const to = toInput.value.trim();
      const subject = emailInput.value.trim();
      addEmail(from, to, subject);
    });

    emailInput.addEventListener("keydown", e => {
      if (e.key === "Enter") addBtn.click();
    });

    fromInput.addEventListener("keydown", e => {
      if (e.key === "Enter") emailInput.focus();
    });

    toInput.addEventListener("keydown", e => {
      if (e.key === "Enter") emailInput.focus();
    });

    emailInput.addEventListener("input", updateButtonState);

    testSoundBtn.addEventListener("click", () => playBeep(soundSelect.value));

    clearAllBtn.addEventListener("click", clearAllEmails);

    exportBtn.addEventListener("click", exportData);

    // Initialize
    loadEmailsFromStorage();
    if (emails.length === 0) updateChart();
    updateButtonState();
  </script>
</body>
</html>
